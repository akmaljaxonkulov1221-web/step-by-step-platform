{% extends "base.html" %}

{% block title %}Parolni o'zgartirish{% endblock %}

{% block page_title %}Parolni o'zgartirish{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-key"></i> Parolni o'zgartirish</h5>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <i class="fas fa-info-circle"></i> Siz bir martalik parol bilan tizimga kirdingiz. Iltimos, xavfsiz parol o'rnating.
                </div>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="new_password" class="form-label">Yangi parol</label>
                        <input type="password" class="form-control" id="new_password" name="new_password" required minlength="6">
                        <div class="form-text">Kamida 6 ta belgi</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Parolni tasdiqlang</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Parolni saqlash
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
