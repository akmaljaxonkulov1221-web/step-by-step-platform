services:
  # Web Service
  - type: web
    name: education-platform
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python migrate_database_new_features.py
    startCommand: gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 120 app:app
    autoDeploy: true
    
    # Environment variables
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: FLASK_APP
        value: app.py
      - key: DATABASE_URL
        value: sqlite:///education_complete.db
    
    # Health check
    healthCheckPath: /health
    
    # Disk space for uploads and database
    disk:
      name: education-platform-disk
      mountPath: /app
      sizeGB: 10
    
    # Build hooks for PDF processing
    buildHooks:
      preBuild:
        - pip install --upgrade pip
      postBuild:
        - mkdir -p uploads/pdfs
        - chmod 755 uploads uploads/pdfs

